<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body bgcolor="#f2f2f2">

<center>

<h1>Student Registration Form</h1>

<form action="#" method="post">

<table cellpadding="10">

<tr>
<td>First Name</td>
<td><input type="text" name="firstname" placeholder="Enter First Name" required></td>
</tr>

<tr>
<td>Last Name</td>
<td><input type="text" name="lastname" placeholder="Enter Last Name" required></td>
</tr>

<tr>
<td>Email</td>
<td><input type="email" name="email" placeholder="Enter Email" required></td>
</tr>

<tr>
<td>Password</td>
<td><input type="password" name="password" placeholder="Enter Password" required></td>
</tr>

<tr>
<td>Phone Number</td>
<td><input type="tel" name="phone" placeholder="9876543210"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td><input type="date" name="dob"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
</td>
</tr>

<tr>
<td>Course</td>
<td>
<select name="course">
<option>Select Course</option>
<option>B.Tech</option>
<option>B.Sc</option>
<option>BCA</option>
<option>MCA</option>
<option>M.Tech</option>
</select>
</td>
</tr>

<tr>
<td>Skills</td>
<td>
<input type="checkbox" name="skills" value="HTML"> HTML
<input type="checkbox" name="skills" value="CSS"> CSS
<input type="checkbox" name="skills" value="JavaScript"> JavaScript
<input type="checkbox" name="skills" value="Python"> Python
</td>
</tr>

<tr>
<td>Address</td>
<td>
<textarea rows="4" cols="30" placeholder="Enter Address"></textarea>
</td>
</tr>

<tr>
<td>Upload Photo</td>
<td><input type="file" name="photo"></td>
</tr>

<tr>
<td>Favorite Color</td>
<td><input type="color" name="color"></td>
</tr>

<tr>
<td>Resume</td>
<td><input type="file" name="resume"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Register">
<input type="reset" value="Clear">
</td>
</tr>

</table>

</form>

</center>

</body>
</html>
